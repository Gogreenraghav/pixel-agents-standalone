<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pixel Office — All Floors</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0a0a1a; overflow: hidden; font-family: monospace; }
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      height: 32px; background: #111122;
      border-bottom: 2px solid #2a2a4a;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 12px; z-index: 100;
    }
    #header .title { color: #aaccff; font-size: 12px; letter-spacing: 2px; }
    #header a {
      color: #667; font-size: 11px; text-decoration: none;
      border: 1px solid #334; padding: 2px 10px; letter-spacing: 1px;
    }
    #header a:hover { color: #aaa; border-color: #556; }
    #grid {
      position: fixed; top: 32px; left: 0; right: 0; bottom: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 2px;
      background: #111;
    }
    .floor-cell { position: relative; overflow: hidden; background: #0a0a1a; }
    .floor-label {
      position: absolute; top: 6px; left: 8px; z-index: 10;
      font-size: 10px; letter-spacing: 1px;
      padding: 2px 8px; pointer-events: none;
    }
    .floor-cell iframe { width: 100%; height: 100%; border: none; display: block; }
  </style>
</head>
<body>
<div id="header">
  <span class="title">⊞ ALL FLOORS — PIXEL OFFICE</span>
  <a href="./index.html">← SINGLE FLOOR</a>
</div>
<div id="grid">
  <div class="floor-cell">
    <div class="floor-label" style="color:#aaccff;background:rgba(0,0,0,0.8);border:1px solid #aaccff;">GROUND FLOOR</div>
    <iframe src="./index.html?floor=0&embed=1" title="Ground Floor"></iframe>
  </div>
  <div class="floor-cell">
    <div class="floor-label" style="color:#aaffcc;background:rgba(0,0,0,0.8);border:1px solid #aaffcc;">FLOOR 1 — CONFERENCE</div>
    <iframe src="./index.html?floor=1&embed=1" title="Floor 1"></iframe>
  </div>
  <div class="floor-cell">
    <div class="floor-label" style="color:#ffccaa;background:rgba(0,0,0,0.8);border:1px solid #ffccaa;">FLOOR 2 — BREAK ROOM</div>
    <iframe src="./index.html?floor=2&embed=1" title="Floor 2"></iframe>
  </div>
  <div class="floor-cell">
    <div class="floor-label" style="color:#ddaaff;background:rgba(0,0,0,0.8);border:1px solid #ddaaff;">FLOOR 3 — DOUBLE WORKING</div>
    <iframe src="./index.html?floor=3&embed=1" title="Floor 3"></iframe>
  </div>
</div>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Pixel Agents Test</title>
  <style>
    body {
      font-family: monospace;
      padding: 20px;
      background: #1e1e1e;
      color: #00ff00;
    }
    .status { margin: 10px 0; }
    .ok { color: #00ff00; }
    .fail { color: #ff0000; }
    iframe {
      margin-top: 20px;
      border: 2px solid #00ff00;
      width: 100%;
      height: 600px;
    }
  </style>
</head>
<body>
  <h1>🧪 Pixel Agents Standalone - Asset Check</h1>
  
  <div id="checks"></div>
  
  <h2>Preview:</h2>
  <iframe src="index.html"></iframe>
  
  <script>
    const checks = document.getElementById('checks');
    
    async function checkAsset(path, name) {
      try {
        const res = await fetch(path);
        const ok = res.ok;
        const size = res.headers.get('content-length');
        checks.innerHTML += `<div class="status ${ok ? 'ok' : 'fail'}">
          ${ok ? '✓' : '✗'} ${name} - ${ok ? size + ' bytes' : 'MISSING'}
        </div>`;
        return ok;
      } catch (e) {
        checks.innerHTML += `<div class="status fail">✗ ${name} - ERROR: ${e.message}</div>`;
        return false;
      }
    }
    
    async function runChecks() {
      checks.innerHTML = '<h2>Asset Checks:</h2>';
      
      await checkAsset('index.html', 'Main HTML');
      await checkAsset('assets/index-DoBQIEQ8.js', 'Main JS Bundle');
      await checkAsset('assets/index-CX8LPhCk.css', 'Main CSS');
      await checkAsset('assets/browserMock-deCxOE2w.js', 'Browser Mock');
      await checkAsset('assets/asset-index.json', 'Asset Index');
      await checkAsset('assets/furniture-catalog.json', 'Furniture Catalog');
      await checkAsset('assets/default-layout-1.json', 'Default Layout');
      
      checks.innerHTML += '<h2>Directory Structure:</h2>';
      const dirs = ['characters', 'floors', 'furniture', 'walls'];
      for (const dir of dirs) {
        await checkAsset(`assets/${dir}/`, `${dir}/ directory`);
      }
      
      checks.innerHTML += '<div class="status ok">✓ All critical assets loaded!</div>';
    }
    
    runChecks();
  </script>
</body>
</html>
